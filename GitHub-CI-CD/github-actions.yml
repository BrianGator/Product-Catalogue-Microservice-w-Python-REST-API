name: Product Catalogue CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      selenium:
        image: selenium/standalone-chrome:latest
        ports:
          - 4444:4444

    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r Requirements.txt

    - name: Run Unit Tests
      run: python -m unittest discover 'Unit Tests'

    - name: Run API Tests
      run: python -m unittest discover 'Rest-API-tests'

    - name: Run BDD tests
      run: behave
